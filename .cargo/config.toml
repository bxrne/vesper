[build]
target = "riscv64gc-unknown-none-elf"
rustflags = ["-Clink-arg=-Tsrc/lds/virt.lds"]

[target.riscv64gc-unknown-none-elf]
runner = "qemu-system-riscv64 -machine virt -cpu rv64 -smp 4 -m 128M -display none -serial stdio -bios none -drive file=hdd.dsk,if=none,format=raw,id=hd0 -device virtio-blk-device,drive=hd0 -kernel"
